<!DOCTYPE html>
<html lang="am" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>የዕለታዊ መረጃ መከታተያ ሲስተም - Dashboard</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen font-sans transition-colors duration-200">

    <!-- Top Navigation Bar -->
    <nav class="sticky top-0 z-40 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-700 px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-brand-600 text-white p-2 rounded-xl shadow-lg shadow-brand-500/30">
                    <i class="fa-solid fa-chart-line text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight" id="appTitle">የዕለታዊ መረጃ መከታተያ</h1>
                    <p class="text-xs text-gray-500 dark:text-gray-400" id="ethDateDisplay">---</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <!-- Theme Toggle -->
                <button id="themeToggleBtn" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-600 transition">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:block text-yellow-400"></i>
                </button>

                <!-- Language Toggle -->
                <button id="langToggleBtn" class="px-3 py-1.5 text-xs font-semibold rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 border border-gray-300 dark:border-gray-600">
                    🇬🇧 EN
                </button>

                <!-- Admin Action Button -->
                <button id="authBtn" onclick="handleAuthClick()" class="flex items-center gap-2 bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-xl text-sm font-medium shadow-md transition">
                    <i class="fa-solid fa-lock"></i>
                    <span id="authBtnText">Admin Login</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="max-w-7xl mx-auto px-4 py-6 space-y-8">

        <!-- Public Summary Cards -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Skill & Job Card -->
            <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl border border-gray-100 dark:border-gray-700/60 shadow-sm relative overflow-hidden">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400" data-i18n="sector1">ስራና ክህሎት</p>
                        <h3 class="text-3xl font-extrabold mt-2" id="statSector1">0</h3>
                    </div>
                    <span class="p-3 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl">
                        <i class="fa-solid fa-briefcase text-xl"></i>
                    </span>
                </div>
            </div>

            <!-- Health Insurance Card -->
            <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl border border-gray-100 dark:border-gray-700/60 shadow-sm relative overflow-hidden">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400" data-i18n="sector2">ጤና መድን</p>
                        <h3 class="text-3xl font-extrabold mt-2" id="statSector2">0</h3>
                    </div>
                    <span class="p-3 bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-xl">
                        <i class="fa-solid fa-heart-pulse text-xl"></i>
                    </span>
                </div>
            </div>

            <!-- Women & Social Affairs Card -->
            <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl border border-gray-100 dark:border-gray-700/60 shadow-sm relative overflow-hidden">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-sm font-medium text-gray-500 dark:text-gray-400" data-i18n="sector3">ሴቶችና ማህበራዊ ጉዳይ</p>
                        <h3 class="text-3xl font-extrabold mt-2" id="statSector3">0</h3>
                    </div>
                    <span class="p-3 bg-purple-50 dark:bg-purple-900/30 text-purple-600 dark:text-purple-400 rounded-xl">
                        <i class="fa-solid fa-hands-holding-child text-xl"></i>
                    </span>
                </div>
            </div>
        </section>

        <!-- Admin Control Panel (Hidden by default JIT) -->
        <section id="adminSection" class="hidden space-y-6">
            <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-md">
                <div class="flex items-center justify-between mb-4 border-b border-gray-100 dark:border-gray-700 pb-3">
                    <h2 class="text-lg font-bold flex items-center gap-2">
                        <i class="fa-solid fa-pen-to-square text-brand-500"></i>
                        <span data-i18n="entryTitle">አዲስ መረጃ መመዝገቢያ (Batch Entry)</span>
                    </h2>
                    <button onclick="addEntryRow()" class="px-3 py-1.5 text-xs bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 rounded-lg transition">
                        <i class="fa-solid fa-plus mr-1"></i> ረድፍ ጨምር
                    </button>
                </div>

                <!-- Multi-row Entry Table Form -->
                <form id="dataEntryForm" onsubmit="handleBatchSubmit(event)">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="text-gray-400 border-b border-gray-100 dark:border-gray-700">
                                    <th class="p-2 font-medium">ዘርፍ</th>
                                    <th class="p-2 font-medium">ስም</th>
                                    <th class="p-2 font-medium">ጾታ</th>
                                    <th class="p-2 font-medium">ቦታ/ቀበሌ</th>
                                    <th class="p-2 font-medium">ብዛት/መጠን</th>
                                    <th class="p-2 text-center">ድርጊት</th>
                                </tr>
                            </thead>
                            <tbody id="entryRowsContainer">
                                <!-- Dynamic Rows Inserted Here -->
                            </tbody>
                        </table>
                    </div>

                    <div class="mt-4 flex justify-end">
                        <button type="submit" id="submitBatchBtn" class="bg-brand-600 hover:bg-brand-700 text-white px-6 py-2 rounded-xl text-sm font-semibold shadow-lg shadow-brand-500/20 transition flex items-center gap-2">
                            <i class="fa-solid fa-paper-plane"></i>
                            <span>መረጃውን መዝግብ</span>
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Main Data View & Filters -->
        <section class="bg-white dark:bg-gray-800 rounded-2xl border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden">
            <!-- Table Action Headers -->
            <div class="p-5 border-b border-gray-100 dark:border-gray-700 flex flex-col md:flex-row gap-4 justify-between items-center">
                <div class="flex items-center gap-2 w-full md:w-auto">
                    <div class="relative w-full md:w-64">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                        <input type="text" id="searchInput" onkeyup="filterRecords()" placeholder="መረጃ ፈልግ..." class="w-full pl-9 pr-3 py-2 text-sm bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500">
                    </div>
                    <select id="sectorFilter" onchange="filterRecords()" class="py-2 px-3 text-sm bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500">
                        <option value="ALL">ሁሉም ዘርፍ</option>
                        <option value="sector1">ስራና ክህሎት</option>
                        <option value="sector2">ጤና መድን</option>
                        <option value="sector3">ሴቶችና ማህበራዊ ጉዳይ</option>
                    </select>
                </div>

                <button onclick="exportToCSV()" class="px-4 py-2 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-xl text-xs font-semibold transition flex items-center gap-2">
                    <i class="fa-solid fa-file-csv text-emerald-500 text-sm"></i>
                    <span>ወደ CSV አውርድ</span>
                </button>
            </div>

            <!-- Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-50 dark:bg-gray-700/50 text-gray-500 dark:text-gray-400">
                        <tr>
                            <th class="p-4 font-semibold">ቀን (ኢትዮጵያ)</th>
                            <th class="p-4 font-semibold">ዘርፍ</th>
                            <th class="p-4 font-semibold">ስም</th>
                            <th class="p-4 font-semibold">ጾታ</th>
                            <th class="p-4 font-semibold">ቦታ</th>
                            <th class="p-4 font-semibold">መጠን</th>
                            <th id="actionHeader" class="p-4 font-semibold text-center hidden">ድርጊት</th>
                        </tr>
                    </thead>
                    <tbody id="dataTableBody" class="divide-y divide-gray-100 dark:divide-gray-700">
                        <!-- Dynamic Records -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <!-- Modal: Admin Login -->
    <div id="loginModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl border border-gray-200 dark:border-gray-700 w-full max-w-md shadow-xl relative">
            <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-shield-halved text-brand-500"></i> Admin Login
            </h3>
            <form onsubmit="handleLoginSubmit(event)" class="space-y-4">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Username</label>
                    <input type="text" id="adminUser" required class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">Admin Passcode</label>
                    <input type="password" id="adminCode" required class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-xl text-sm">
                </div>
                <div class="flex justify-end gap-2 pt-2">
                    <button type="button" onclick="toggleLoginModal(false)" class="px-4 py-2 text-xs rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700">ሰርዝ</button>
                    <button type="submit" class="px-4 py-2 bg-brand-600 text-white text-xs font-semibold rounded-xl hover:bg-brand-700">ግባ</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Application Script -->
    <script>
        // --- 1. CONFIGURATIONS ---
        const firebaseConfig = {
            // Insert Firebase Config Here
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const TELEGRAM_CONFIG = {
            botToken: "YOUR_TELEGRAM_BOT_TOKEN",
            chatId: "YOUR_TELEGRAM_CHAT_ID"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // --- 2. STATE MANAGEMENT ---
        let state = {
            isAdmin: false,
            lang: 'am',
            records: []
        };

        // --- 3. ETHIOPIAN DATE CONVERTER UTILITY ---
        function getEthiopianDate(date = new Date()) {
            // Simplified Conversion Logic for UI Display
            const ethMonths = ["መስከረም", "ጥቅምት", "ኅዳር", "ታኅሣሥ", "ጥር", "የካቲት", "መጋቢት", "ሚያዝያ", "ግንቦት", "ሰኔ", "ሐምሌ", "ነሐሴ", "ጳጉሜ"];
            
            // Standard static offset approximation for UI
            let year = date.getFullYear() - 8;
            let monthIndex = date.getMonth() - 8;
            if (monthIndex < 0) {
                monthIndex += 12;
            }
            let day = date.getDate();

            return `${ethMonths[monthIndex]} ${day}፣ ${year}`;
        }

        // --- 4. INITIALIZATION ---
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("ethDateDisplay").innerText = getEthiopianDate();
            initTheme();
            addEntryRow(); // Initial Entry Row
            listenToRealtimeData();
        });

        // --- 5. THEME TOGGLE ---
        function initTheme() {
            const themeBtn = document.getElementById("themeToggleBtn");
            themeBtn.addEventListener("click", () => {
                document.documentElement.classList.toggle("dark");
            });
        }

        // --- 6. REALTIME FIRESTORE DATA ---
        function listenToRealtimeData() {
            db.collection("daily_records").orderBy("timestamp", "desc")
                .onSnapshot(snapshot => {
                    state.records = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderDashboard();
                    renderTable();
                }, error => {
                    console.warn("Firestore access error / demo mode", error);
                });
        }

        // --- 7. UI RENDER FUNCTIONS ---
        function renderDashboard() {
            const totals = { sector1: 0, sector2: 0, sector3: 0 };
            
            state.records.forEach(r => {
                if (totals[r.sector] !== undefined) {
                    totals[r.sector] += Number(r.amount || 0);
                }
            });

            document.getElementById("statSector1").innerText = totals.sector1;
            document.getElementById("statSector2").innerText = totals.sector2;
            document.getElementById("statSector3").innerText = totals.sector3;
        }

        function renderTable(data = state.records) {
            const tbody = document.getElementById("dataTableBody");
            tbody.innerHTML = "";

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-xs text-gray-400">ምንም የተመዘገበ መረጃ የለም</td></tr>`;
                return;
            }

            data.forEach(item => {
                const tr = document.createElement("tr");
                tr.className = "hover:bg-gray-50 dark:hover:bg-gray-700/30 transition";

                tr.innerHTML = `
                    <td class="p-4 text-xs font-medium">${item.ethDate || '—'}</td>
                    <td class="p-4 text-xs"><span class="px-2 py-1 rounded-lg bg-gray-100 dark:bg-gray-700 font-semibold">${getSectorLabel(item.sector)}</span></td>
                    <td class="p-4 text-sm font-semibold">${item.name || '—'}</td>
                    <td class="p-4 text-xs">${item.gender || '—'}</td>
                    <td class="p-4 text-xs">${item.location || '—'}</td>
                    <td class="p-4 text-sm font-bold text-brand-600 dark:text-brand-400">${item.amount || 0}</td>
                    ${state.isAdmin ? `<td class="p-4 text-center"><button onclick="deleteRecord('${item.id}')" class="text-red-500 hover:text-red-700 text-xs"><i class="fa-solid fa-trash"></i></button></td>` : ''}
                `;
                tbody.appendChild(tr);
            });
        }

        function getSectorLabel(key) {
            const labels = {
                sector1: "ስራና ክህሎት",
                sector2: "ጤና መድን",
                sector3: "ሴቶችና ማህበራዊ ጉዳይ"
            };
            return labels[key] || key;
        }

        // --- 8. BATCH ENTRY HANDLERS ---
        function addEntryRow() {
            const container = document.getElementById("entryRowsContainer");
            const rowId = Date.now();
            
            const tr = document.createElement("tr");
            tr.id = `row-${rowId}`;
            tr.className = "border-b border-gray-100 dark:border-gray-700";
            tr.innerHTML = `
                <td class="p-2">
                    <select class="entry-sector w-full p-2 text-xs bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg">
                        <option value="sector1">ስራና ክህሎት</option>
                        <option value="sector2">ጤና መድን</option>
                        <option value="sector3">ሴቶችና ማህበራዊ ጉዳይ</option>
                    </select>
                </td>
                <td class="p-2"><input type="text" placeholder="ሙሉ ስም" class="entry-name w-full p-2 text-xs bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg"></td>
                <td class="p-2">
                    <select class="entry-gender w-full p-2 text-xs bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg">
                        <option value="ወንድ">ወንድ</option>
                        <option value="ሴት">ሴት</option>
                    </select>
                </td>
                <td class="p-2"><input type="text" placeholder="ቦታ/ቀበሌ" class="entry-location w-full p-2 text-xs bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg"></td>
                <td class="p-2"><input type="number" placeholder="0" class="entry-amount w-full p-2 text-xs bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg"></td>
                <td class="p-2 text-center">
                    <button type="button" onclick="removeEntryRow('row-${rowId}')" class="text-red-400 hover:text-red-600"><i class="fa-solid fa-circle-xmark"></i></button>
                </td>
            `;
            container.appendChild(tr);
        }

        function removeEntryRow(rowId) {
            const row = document.getElementById(rowId);
            if (row) row.remove();
        }

        async function handleBatchSubmit(e) {
            e.preventDefault();
            const rows = document.querySelectorAll("#entryRowsContainer tr");
            const batchData = [];
            const ethDateToday = getEthiopianDate();

            rows.forEach(row => {
                const name = row.querySelector(".entry-name").value.trim();
                const amount = row.querySelector(".entry-amount").value;
                if (name && amount) {
                    batchData.push({
                        sector: row.querySelector(".entry-sector").value,
                        name: name,
                        gender: row.querySelector(".entry-gender").value,
                        location: row.querySelector(".entry-location").value.trim(),
                        amount: Number(amount),
                        ethDate: ethDateToday,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
            });

            if (batchData.length === 0) {
                alert("እባክዎን ቢያንስ የአንድ ሰው ሙሉ መረጃ ያስገቡ!");
                return;
            }

            try {
                const batch = db.batch();
                batchData.forEach(item => {
                    const docRef = db.collection("daily_records").doc();
                    batch.set(docRef, item);
                });

                await batch.commit();
                
                // Telegram Notification
                sendTelegramNotification(`🔔 <b>አዲስ መረጃ ተመዝግቧል!</b>\n\nየተመዘገቡ ብዛት: ${batchData.length}\nቀን: ${ethDateToday}`);

                // Reset Form
                document.getElementById("entryRowsContainer").innerHTML = "";
                addEntryRow();
                alert("መረጃው በስኬት ተመዝግቧል!");

            } catch (err) {
                console.error("Error submitting batch:", err);
                alert("መረጃውን መመዝገብ አልተቻለም።");
            }
        }

        // --- 9. EXTERNAL NOTIFICATIONS ---
        function sendTelegramNotification(message) {
            if (!TELEGRAM_CONFIG.botToken || TELEGRAM_CONFIG.botToken === "YOUR_TELEGRAM_BOT_TOKEN") return;

            const url = `https://api.telegram.org/bot${TELEGRAM_CONFIG.botToken}/sendMessage`;
            fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CONFIG.chatId,
                    text: message,
                    parse_mode: "HTML"
                })
            }).catch(err => console.error("Telegram Notification Error:", err));
        }

        // --- 10. AUTHENTICATION HANDLERS ---
        function handleAuthClick() {
            if (state.isAdmin) {
                // Logout
                state.isAdmin = false;
                document.getElementById("adminSection").classList.add("hidden");
                document.getElementById("actionHeader").classList.add("hidden");
                document.getElementById("authBtnText").innerText = "Admin Login";
                renderTable();
            } else {
                toggleLoginModal(true);
            }
        }

        function toggleLoginModal(show) {
            document.getElementById("loginModal").classList.toggle("hidden", !show);
        }

        function handleLoginSubmit(e) {
            e.preventDefault();
            const user = document.getElementById("adminUser").value;
            const code = document.getElementById("adminCode").value;

            // Simple Client Passcode (Replace with Secure Auth in Production)
            if (user === "admin" && code === "1234") {
                state.isAdmin = true;
                document.getElementById("adminSection").classList.remove("hidden");
                document.getElementById("actionHeader").classList.remove("hidden");
                document.getElementById("authBtnText").innerText = "Logout";
                toggleLoginModal(false);
                renderTable();
            } else {
                alert("ተሳስተዋል። እባክዎን ትክክለኛ መረጃ ያስገቡ!");
            }
        }

        // --- 11. FILTERS & EXPORT ---
        function filterRecords() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const sector = document.getElementById("sectorFilter").value;

            const filtered = state.records.filter(r => {
                const matchesSearch = (r.name && r.name.toLowerCase().includes(query)) ||
                                      (r.location && r.location.toLowerCase().includes(query));
                const matchesSector = (sector === "ALL") || (r.sector === sector);
                return matchesSearch && matchesSector;
            });

            renderTable(filtered);
        }

        function exportToCSV() {
            if (state.records.length === 0) return alert("የሚወርድ መረጃ የለም!");

            let csvContent = "data:text/csv;charset=utf-8,ቀን,ዘርፍ,ስም,ጾታ,ቦታ,መጠን\n";
            state.records.forEach(r => {
                csvContent += `${r.ethDate || ''},${getSectorLabel(r.sector)},${r.name || ''},${r.gender || ''},${r.location || ''},${r.amount || 0}\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Data_Export_${new Date().toISOString().slice(0,10)}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        async function deleteRecord(id) {
            if (confirm("እርግጠኛ ነዎት ይህ መረጃ እንዲሰረዝ ይፈልጋሉ?")) {
                try {
                    await db.collection("daily_records").doc(id).delete();
                } catch (err) {
                    console.error("Delete Error:", err);
                }
            }
        }
    </script>
</body>
