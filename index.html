<!DOCTYPE html>
<html lang="am">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>የዕለታዊ መረጃዎች መመዝገቢያ ስርዓተ ማህደር</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --border: #e2e8f0;
      --danger: #ef4444;
      --success: #22c55e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 30px; }
    h1 { font-size: 24px; color: var(--primary); margin-bottom: 10px; }
    
    /* Navigation Tabs */
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
    .tab-btn { background: none; border: none; padding: 10px 20px; font-size: 16px; font-weight: 600; cursor: pointer; color: #64748b; border-bottom: 3px solid transparent; transition: all 0.3s; }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
    
    /* Form Cards */
    .card { background: var(--card-bg); border-radius: 8px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 30px; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-weight: 600; font-size: 14px; }
    input, select, textarea { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 15px; outline: none; }
    input:focus, textarea:focus { border-color: var(--primary); }
    
    .job-section { border-top: 1px dashed var(--border); margin-top: 20px; padding-top: 20px; }
    .job-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }

    /* Buttons */
    button { background-color: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background-color: var(--primary-hover); }
    button.ghost { background: none; border: 1px solid var(--border); color: var(--text); }
    button.ghost:hover { background: #f1f5f9; }
    button.small { padding: 6px 12px; font-size: 13px; }
    button.danger { background-color: var(--danger); }
    button.danger:hover { background-color: #dc2626; }
    
    /* History & Table Styles */
    .hist-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
    .table-container { overflow-x: auto; margin-top: 15px; }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
    th, td { padding: 12px; border-bottom: 1px solid var(--border); text-align: right; }
    th:first-child, td:first-child { text-align: left; }
    th { background-color: #f1f5f9; font-weight: 600; }
    
    /* Utility Classes */
    .hidden { display: none !important; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: #334155; color: white; padding: 12px 24px; border-radius: 6px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); z-index: 1000; transition: opacity 0.3s; }
    .toast.success { background-color: var(--success); }
    .toast.error { background-color: var(--danger); }
    .empty-state { text-align: center; padding: 30px; color: #64748b; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>ዕለታዊ መረጃዎች መመዝገቢያ</h1>
    <p>የስራ ሂደቶችን መረጃ በጥራትና በፍጥነት መመዝገቢያ ማዕከል</p>
  </header>

  <!-- የስራ ክፍል መምረጫ ታቦች -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchFormTab('labor')">💼 ስራና ክህሎት</button>
    <button class="tab-btn" onclick="switchFormTab('insurance')">🏥 ጤና መድን</button>
    <button class="tab-btn" onclick="switchFormTab('social')">👥 ማህበራዊ ጉዳይ</button>
  </div>

  <!-- 1. ስራና ክህሎት ፎርም -->
  <section id="labor-section" class="card form-panel">
    <h2>የስራና ክህሎት ዕለታዊ ቆጠራ</h2><br>
    <form id="labor-form">
      <div class="form-grid">
        <div class="form-group">
          <label>ቀን</label>
          <input type="date" id="lab-date" required>
        </div>
        <div class="form-group">
          <label>ስራ አጥ (ወንድ)</label>
          <input type="number" id="lab-unempMale" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>ስራ አጥ (ሴት)</label>
          <input type="number" id="lab-unempFemale" min="0" placeholder="0">
        </div>
      </div>
      <div class="form-group" style="margin-bottom: 20px;">
        <label>ማስታወሻ</label>
        <textarea id="lab-notes" rows="3" placeholder="ተጨማሪ ማብራሪያ ካለ..."></textarea>
      </div>
      <button type="submit">መረጃውን መዝግብ</button>
    </form>
  </section>

  <!-- 2. ጤና መድን ፎርም -->
  <section id="insurance-section" class="card form-panel hidden">
    <h2>የጤና መድን ዕለታዊ ቆጠራ</h2><br>
    <form id="insurance-form">
      <div class="form-grid">
        <div class="form-group">
          <label>ቀን</label>
          <input type="date" id="ins-date" required>
        </div>
        <div class="form-group">
          <label>አዲስ አባል (ወንድ)</label>
          <input type="number" id="ins-newMale" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>አዲስ አባል (ሴት)</label>
          <input type="number" id="ins-newFemale" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>ያደሱ አባል (ወንድ)</label>
          <input type="number" id="ins-renewMale" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>ያደሱ አባል (ሴት)</label>
          <input type="number" id="ins-renewFemale" min="0" placeholder="0">
        </div>
      </div>
      <div class="form-group" style="margin-bottom: 20px;">
        <label>ማስታወሻ</label>
        <textarea id="ins-notes" rows="3" placeholder="ተጨማሪ ማብራሪያ ካለ..."></textarea>
      </div>
      <button type="submit">መረጃውን መዝግብ</button>
    </form>
  </section>

  <!-- 3. ሴቶችና ማህበራዊ ጉዳይ ፎርም -->
  <section id="social-section" class="card form-panel hidden">
    <h2>የሴቶችና ማህበራዊ ጉዳይ ዕለታዊ ቆጠራ</h2><br>
    <form id="social-form">
      <div class="form-grid">
        <div class="form-group">
          <label>ቀን</label>
          <input type="date" id="so-date" required>
        </div>
        <div class="form-group">
          <label>አረጋውያን</label>
          <input type="number" id="so-elderly" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>አካል ጉዳተኞች</label>
          <input type="number" id="so-disabled" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>ሴቶች</label>
          <input type="number" id="so-women" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>ህጻናት</label>
          <input type="number" id="so-children" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>ዝቅተኛ ገቢ ያላቸው</label>
          <input type="number" id="so-lowincome" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>የተገኘ ገቢ ድምር (ብር)</label>
          <input type="number" id="so-income-sum" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>የገቢ ተጠቃሚዎች ብዛት</label>
          <input type="number" id="so-income-count" min="0" placeholder="0">
        </div>
      </div>

      <!-- የስራ መስክ ስርጭቶች (Job Type Counts) -->
      <div class="job-section">
        <h3>የተሰማሩበት የስራ መስክ ብዛት (ቆጠራ)</h3><br>
        <div class="job-grid">
          <div class="form-group">
            <label>እለት ሰራተኛ</label>
            <input type="number" class="so-job-input" data-job="day_labor" min="0" placeholder="0">
          </div>
          <div class="form-group">
            <label>ንግድ</label>
            <input type="number" class="so-job-input" data-job="trade" min="0" placeholder="0">
          </div>
          <div class="form-group">
            <label>ግብርና</label>
            <input type="number" class="so-job-input" data-job="agriculture" min="0" placeholder="0">
          </div>
          <div class="form-group">
            <label>ሌላ ስራ</label>
            <input type="number" class="so-job-input" data-job="other" min="0" placeholder="0">
          </div>
        </div>
      </div>

      <div class="form-group" style="margin-top: 20px; margin-bottom: 20px;">
        <label>ማስታወሻ</label>
        <textarea id="so-notes" rows="3" placeholder="ተጨማሪ ማብራሪያ ካለ..."></textarea>
      </div>
      <button type="submit">መረጃውን መዝግብ</button>
    </form>
  </section>

  <!-- የአድሚን ታሪክ መመልከቻ (History Table) -->
  <section class="card">
    <h2>የተመዘገቡ መረጃዎች ታሪክ (Admin Only)</h2><br>
    
    <div class="hist-tabs">
      <button class="ghost small active" id="btn-hist-labor" onclick="switchHistTab('labor')">ስራና ክህሎት</button>
      <button class="ghost small" id="btn-hist-insurance" onclick="switchHistTab('insurance')">ጤና መድን</button>
      <button class="ghost small" id="btn-hist-social" onclick="switchHistTab('social')">ማህበራዊ ጉዳይ</button>
    </div>

    <div class="table-container">
      <table>
        <thead id="hist-thead"></thead>
        <tbody id="hist-body"></tbody>
      </table>
      <div id="hist-empty" class="empty-state hidden">ምንም የተመዘገበ መረጃ አልተገኘም።</div>
    </div>
  </section>
</div>

<!-- መለዋወጫ መልዕክት ማሳያ (Toast Notification) -->
<div id="toast" class="toast hidden"></div>

<!-- የFirebase SDK ግንኙነቶች (ከተጠቀሙበት) -->
<script type="module">
  // የFirebase ውቅረቶችዎን እዚህ ስር ያገናኙ፡
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js";
  import { getFirestore, collection, addDoc, doc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/9.x.x/firebase-firestore.js";

  // Firebase Config (የእርስዎን ኮድ እዚህ ይተኩት)
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_STORAGE_BUCKET",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ለቀሪው የጃቫስክሪፕት ስራ ግሎባል ተለዋዋጮችን ማስተዋወቅ
  window.db = db;
  window.collection = collection;
  window.addDoc = addDoc;
  window.doc = doc;
  window.deleteDoc = deleteDoc;
  window.onSnapshot = onSnapshot;
</script>

<script>
// ---- የአሁን መረጃዎችን መያዣ (Local Arrays) ----
let laborEntries = [];
let insuranceEntries = [];
let socialEntries = [];
let activeHistTab = 'labor';

// ---- ረዳት ፈንክሽኖች (Helper Functions) ----
function todayISO() {
  return new Date().toISOString().split('T')[0];
}

// የኢትዮጵያ ቀን መቀየሪያ (ቀለል ያለ ማሳያ - እንደ ፍላጎትዎ መቀየር ይችላሉ)
function toEthiopianDate(dateStr) {
  if(!dateStr) return '';
  const d = new Date(dateStr);
  // ለናሙና ያህል ቀለል ያለ ስሌት (ትክክለኛውን አልጎሪዝም መተካት ይችላሉ)
  const ethYear = d.getFullYear() - 8; 
  return `${d.getDate()}/${d.getMonth()+1}/${ethYear} ዓ.ም`;
}

function escapeAttr(str) {
  if (!str) return '—';
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function money(val) {
  if(!val) return '0.00 ብር';
  return Number(val).toLocaleString('en-US', { minimumFractionDigits: 2 }) + ' ብር';
}

function showToast(msg, type='success') {
  const toast = document.getElementById('toast');
  toast.innerText = msg;
  toast.className = `toast ${type}`;
  toast.classList.remove('hidden');
  setTimeout(() => toast.classList.add('hidden'), 3000);
}

// ቴሌግራም መላኪያ
async function sendTelegram(text) {
  const BOT_TOKEN = 'YOUR_BOT_TOKEN'; // የእርስዎን ቦት ቶከን እዚህ ይተኩ
  const CHAT_ID = 'YOUR_CHAT_ID';     // የእርስዎን ቻናል ወይም ቻት መታወቂያ እዚህ ይተኩ
  if(BOT_TOKEN === 'YOUR_BOT_TOKEN') return; // ካልተዋቀረ እንዲያልፈው
  try {
    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CHAT_ID, text: text })
    });
  } catch(e) {
    console.error('Telegram መላክ አልተቻለም:', e);
  }
}

// ---- የፎርም ታብ መለዋወጫ ----
window.switchFormTab = function(tabName) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(panel => panel.classList.add('hidden'));
  
  event.target.classList.add('active');
  document.getElementById(`${tabName}-section`).classList.remove('hidden');
}

// ---- የታሪክ ሰንጠረዥ ታብ መለዋወጫ ----
window.switchHistTab = function(tabName) {
  activeHistTab = tabName;
  document.querySelectorAll('.hist-tabs button').forEach(btn => btn.classList.remove('active'));
  document.getElementById(`btn-hist-${tabName}`).classList.add('active');
  renderHistTable();
}

// ---- 1. የስራና ክህሎት ፎርም ሰብሚት ሲደረግ ----
document.getElementById('labor-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const date = document.getElementById('lab-date').value;
  const rec = {
    date,
    ethDate: toEthiopianDate(date),
    unempMale: Number(document.getElementById('lab-unempMale').value) || 0,
    unempFemale: Number(document.getElementById('lab-unempFemale').value) || 0,
    notes: document.getElementById('lab-notes').value.trim(),
    createdAt: Date.now()
  };

  if(!rec.unempMale && !rec.unempFemale && !rec.notes) {
    showToast('እባክዎ ቢያንስ አንድ መረጃ ያስገቡ', 'error');
    return;
  }

  try {
    await addDoc(collection(db, 'labor_tally'), rec);
    await sendTelegram(`💼 ስራና ክህሎት — ዕለታዊ ቆጠራ\n📅 ${rec.ethDate} (${rec.date})\nስራ አጥ (ወንድ): ${rec.unempMale} • (ሴት): ${rec.unempFemale}\n${rec.notes ? '📝 ' + rec.notes : ''}`);
    showToast('መረጃው ተመዝግቧል');
    document.getElementById('labor-form').reset();
    document.getElementById('lab-date').value = todayISO();
  } catch(e) {
    console.error(e);
    showToast('ስህተት ተፈጥሯል፣ Firestore ያረጋግጡ', 'error');
  }
});

// ---- 2. የጤና መድን ፎርም ሰብሚት ሲደረግ ----
document.getElementById('insurance-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const date = document.getElementById('ins-date').value;
  const rec = {
    date,
    ethDate: toEthiopianDate(date),
    newMale: Number(document.getElementById('ins-newMale').value) || 0,
    newFemale: Number(document.getElementById('ins-newFemale').value) || 0,
    renewMale: Number(document.getElementById('ins-renewMale').value) || 0,
    renewFemale: Number(document.getElementById('ins-renewFemale').value) || 0,
    notes: document.getElementById('ins-notes').value.trim(),
    createdAt: Date.now()
  };

  if(!rec.newMale && !rec.newFemale && !rec.renewMale && !rec.renewFemale && !rec.notes) {
    showToast('እባክዎ ቢያንስ አንድ መረጃ ያስገቡ', 'error');
    return;
  }

  try {
    await addDoc(collection(db, 'insurance_tally'), rec);
    await sendTelegram(`🏥 ጤና መድን — ዕለታዊ ቆጠራ\n📅 ${rec.ethDate} (${rec.date})\nአዲስ አባል: ወ-${rec.newMale} ሴ-${rec.newFemale}\nያደሱ አባል: ወ-${rec.renewMale} ሴ-${rec.renewFemale}\n${rec.notes ? '📝 ' + rec.notes : ''}`);
    showToast('መረጃው ተመዝግቧል');
    document.getElementById('insurance-form').reset();
    document.getElementById('ins-date').value = todayISO();
  } catch(e) {
    console.error(e);
    showToast('ስህተት ተፈጥሯል', 'error');
  }
});

// ---- 3. የማህበራዊ ጉዳይ ፎርም ሰብሚት ሲደረግ ----
document.getElementById('social-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const date = document.getElementById('so-date').value;
  const jobTypeCounts = {};

  document.querySelectorAll('.so-job-input').forEach(inp => {
    const v = Number(inp.value) || 0;
    if (v > 0) jobTypeCounts[inp.dataset.job] = v;
  });

  const rec = {
    date, 
    ethDate: toEthiopianDate(date),
    elderly: Number(document.getElementById('so-elderly').value) || 0,
    disabled: Number(document.getElementById('so-disabled').value) || 0,
    women: Number(document.getElementById('so-women').value) || 0,
    children: Number(document.getElementById('so-children').value) || 0,
    lowIncome: Number(document.getElementById('so-lowincome').value) || 0,
    jobTypeCounts,
    incomeSum: Number(document.getElementById('so-income-sum').value) || 0,
    incomeCount: Number(document.getElementById('so-income-count').value) || 0,
    notes: document.getElementById('so-notes').value.trim(),
    createdAt: Date.now()
  };

  const hasAny = rec.elderly || rec.disabled || rec.women || rec.children || rec.lowIncome || Object.keys(jobTypeCounts).length || rec.incomeSum || rec.incomeCount;
  
  if (!hasAny && !rec.notes) { 
    showToast('እባክዎ ቢያንስ አንድ ቁጥር ያስገቡ', 'error'); 
    return; 
  }

  try {
    await addDoc(collection(db, 'social_tally'), rec);
    await sendTelegram(`👥 ሴቶችና ማህበራዊ ጉዳይ — ዕለታዊ ቆጠራ\n📅 ${rec.ethDate} (${rec.date})\nአረጋውያን: ${rec.elderly} • አካል ጉዳተኞች: ${rec.disabled} • ሴቶች: ${rec.women}\nህጻናት: ${rec.children} • ዝቅተኛ ገቢ: ${rec.lowIncome}${rec.notes ? '\n📝 ' + rec.notes : ''}`);
    
    showToast('ተመዝግቧል');
    document.getElementById('social-form').reset();
    document.getElementById('so-date').value = todayISO();
  } catch (e) { 
    console.error(e); 
    showToast('ስህተት ተፈጥሯል፣ Firestore ያረጋግጡ', 'error'); 
  }
});

// ---- ታሪክ ሰንጠረዥ (History table) አቀራረብ ----
function renderHistTable() {
  const thead = document.getElementById('hist-thead');
  const tbody = document.getElementById('hist-body');
  const emptyEl = document.getElementById('hist-empty');
  let list = [], cols = [];

  if (activeHistTab === 'labor') {
    list = laborEntries; 
    cols = ['ቀን', 'ስራ አጥ ወ', 'ስራ አጥ ሴ', 'ማስታወሻ', 'ድርጊት'];
  } else if (activeHistTab === 'insurance') {
    list = insuranceEntries; 
    cols = ['ቀን', 'አዲስ ወ', 'አዲስ ሴ', 'ያደሱ ወ', 'ያደሱ ሴ', 'ማስታወሻ', 'ድርጊት'];
  } else {
    list = socialEntries; 
    cols = ['ቀን', 'አረጋውያን', 'አካል ጉዳ.', 'ሴቶች', 'ህጻናት', 'ዝቅ.ገቢ', 'ገቢ ድምር', 'ማስታወሻ', 'ድርጊት'];
  }

  thead.innerHTML = '<tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr>';

  const sorted = list.slice().sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  if (sorted.length === 0) { 
    tbody.innerHTML = ''; 
    emptyEl.classList.remove('hidden'); 
    return; 
  }
  emptyEl.classList.add('hidden');

  tbody.innerHTML = sorted.map(r => {
    let cells = [];
    if (activeHistTab === 'labor') {
      cells = [r.date, r.unempMale, r.unempFemale, escapeAttr(r.notes)];
    } else if (activeHistTab === 'insurance') {
      cells = [r.date, r.newMale, r.newFemale, r.renewMale, r.renewFemale, escapeAttr(r.notes)];
    } else {
      cells = [r.date, r.elderly, r.disabled, r.women, r.children, r.lowIncome, money(r.incomeSum), escapeAttr(r.notes)];
    }
    
    return `<tr>${cells.map(c => `<td>${c}</td>`).join('')}<td><button type="button" class="danger small" data-del="${r.id}">ሰርዝ</button></td></tr>`;
  }).join('');
}

// ---- ከመዝገብ ላይ መሰረዝ ----
document.getElementById('hist-body').addEventListener('click', async (e) => {
  const btn = e.target.closest('[data-del]');
  if (!btn) return;
  if (!confirm('ይህን ምዝገባ መሰረዝ ይፈልጋሉ?')) return;
  
  const coll = activeHistTab === 'labor' ? 'labor_tally' : activeHistTab === 'insurance' ? 'insurance_tally' : 'social_tally';
  try { 
    await deleteDoc(doc(db, coll, btn.dataset.del)); 
    showToast('ተሰርዟል'); 
  } catch (err) { 
    console.error(err); 
    showToast('መሰረዝ አልተቻለም', 'error'); 
  }
});

// ---- መረጃዎችን ከFirestore በሪልታይም የማንበብ (Realtime Sync) ----
function initDataSync() {
  // ቀኑን የዛሬ ለማድረግ
  document.getElementById('lab-date').value = todayISO();
  document.getElementById('ins-date').value = todayISO();
  document.getElementById('so-date').value = todayISO();

  // 1. የስራና ክህሎት መረጃዎች
  onSnapshot(collection(db, "labor_tally"), (snapshot) => {
    laborEntries = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    if(activeHistTab === 'labor') renderHistTable();
  });

  // 2. የጤና መድን መረጃዎች
  onSnapshot(collection(db, "insurance_tally"), (snapshot) => {
    insuranceEntries = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    if(activeHistTab === 'insurance') renderHistTable();
  });

  // 3. የማህበራዊ ጉዳይ መረጃዎች
  onSnapshot(collection(db, "social_tally"), (snapshot) => {
    socialEntries = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    if(activeHistTab === 'social') renderHistTable();
  });
}

// ፔጁ ሲጫን ሲንክ ይጀምራል
setTimeout(initDataSync, 1000); // ፎርሞቹና Firebase Config እንዲነበቡ ጥቂት ሰኮንድ ይሰጠዋል
</script>
